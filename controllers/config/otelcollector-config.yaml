receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"
  k8s_cluster:
    auth_type: serviceAccount
    node_conditions_to_report: ["Ready", "MemoryPressure", "DiskPressure"]
    allocatable_types_to_report: ["cpu", "memory"]
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector-self"
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8889"]
  fluentforward:
    endpoint: "0.0.0.0:24224"

processors:
  k8sattributes:
    auth_type: "serviceAccount"
    passthrough: false
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.container.name
      labels:
        - tag_name: app.label.component
          key: app.kubernetes.io/component
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
  batch:
    send_batch_size: 1000
    timeout: 10s
    send_batch_max_size: 2000
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100
  resourcedetection:
    detectors: [gcp, env]
    timeout: 5s
  transform/masking:
    log_statements:
      - context: log
        statements:
          - replace_pattern(body, "\\b\\d{4}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b", "MASKED_CARD")
          - replace_pattern(body, "\\b\\d{3}-\\d{2}-\\d{4}\\b", "MASKED_SSN")

exporters:
  googlecloud:
    project: "${GCP_PROJECT_ID}"
    log_config:
      default_log_name: "opentelemetry.io/collector-exported-log"
  googlemanagedprometheus:
    project: "${GCP_PROJECT_ID}"
  googlepubsub:
    project: "${GCP_PROJECT_ID}"
    topic: "projects/${GCP_PROJECT_ID}/topics/telemetry-raw"
    compression: gzip
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otelcol
  logging:
    loglevel: warn

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  pprof:
    endpoint: "0.0.0.0:1777"
  zpages:
    endpoint: "0.0.0.0:55679"

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resourcedetection, batch]
      exporters: [googlecloud, googlepubsub]
    metrics:
      receivers: [otlp, prometheus, k8s_cluster]
      processors: [memory_limiter, k8sattributes, resourcedetection, batch]
      exporters: [googlecloud, googlemanagedprometheus, prometheus]
    logs:
      receivers: [otlp, fluentforward]
      processors: [memory_limiter, k8sattributes, resourcedetection, transform/masking, batch]
      exporters: [googlecloud, googlepubsub]
  telemetry:
    logs:
      level: "warn"
    metrics:
      address: "0.0.0.0:8888"
